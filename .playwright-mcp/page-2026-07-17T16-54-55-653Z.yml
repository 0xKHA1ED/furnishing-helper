        - heading "Product description" [level=2] [ref=e1002]
        - paragraph [ref=e1004]: Experience superior food storage with this BEKOGLOBAL fridge freezer, featuring innovative HarvestFresh technology and NeoFrost Dual Cooling system for optimal freshness. The spacious 455-litre capacity, with 313 litres for fresh food and 93 litres for frozen items, makes it perfect for families. Standing at 185 cm tall with a 70 cm width, this appliance combines style with functionality. The ProSmart Inverter Compressor ensures efficient operation, while the reversible door adds flexibility to your kitchen layout. The black finish and membrane display controls offer a modern aesthetic. The no-frost cooling system eliminates the hassle of manual defrosting, keeping your food properly preserved. With its thoughtful design and practical features, this fridge freezer delivers reliable performance for your daily food storage needs. The unit's dimensions (185 cm x 70 cm x 66.5 cm) ensure it fits seamlessly into your kitchen space while providing ample storage capacity.
