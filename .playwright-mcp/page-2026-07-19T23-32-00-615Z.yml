        - generic [ref=f112e577]:
          - heading "FAQ" [level=2] [ref=f112e583]
          - list [ref=f112e585]:
            - listitem [ref=f112e586]:
              - generic [ref=f112e588]:
                - generic [ref=f112e589]: Q.
                - paragraph [ref=f112e592]: What is the best kg for a washing machine?
              - generic [ref=f112e594]:
                - generic [ref=f112e595]: A.
                - paragraph [ref=f112e598]: LG recommends a washing machine with a drum capacity of 8–9 kg for an average-sized household. Consider a larger 11-13 kg model for a large family or if you generate particularly large laundry loads. Larger models can also cope with a duvet up to king-size. Remember that LG’s innovative technology means our appliances can offer increased capacity for the same size of washing machine.
            - listitem [ref=f112e599]:
              - generic [ref=f112e601]:
                - generic [ref=f112e602]: Q.
                - paragraph [ref=f112e605]: Why is my laundry covered with dust and lint?
              - generic [ref=f112e607]:
                - generic [ref=f112e608]: A.
                - generic [ref=f112e610]:
                  - paragraph [ref=f112e611]: 1. Dust generated during washing is filtered through a cleaning filter. If the cleaning filter is full, the dust may not be filtered out properly. The cleaning filter can be manually cleaned before every wash to prevent the machine from leaving dust and lint on clothes.
                  - paragraph [ref=f112e612]: 2. Separate your colored and white clothes from your black and lint-producing clothes. Wash them in different loads to further prevent unwanted dust and lint in your laundry.
            - listitem [ref=f112e613]:
              - generic [ref=f112e615]:
                - generic [ref=f112e616]: Q.
                - paragraph [ref=f112e619]: "[IE] What should I do when I encounter this error?"
              - generic [ref=f112e621]:
                - generic [ref=f112e622]: A.
                - generic [ref=f112e624]:
                  - paragraph [ref=f112e625]: 1. It occurs when the washing container is not filled with water for a certain period of time.
                  - paragraph [ref=f112e626]: 2. Check if the faucet is locked or the water hose is not connected
                  - paragraph [ref=f112e627]: 3. Check if the water supply hose is pressed or bent
                  - paragraph [ref=f112e628]: 4. Please check if the water supply hose is frozen because of the cold weather
            - listitem [ref=f112e629]:
              - generic [ref=f112e631]:
                - generic [ref=f112e632]: Q.
                - paragraph [ref=f112e635]: "[OE] What should I do when I encounter this error?"
              - generic [ref=f112e637]:
                - generic [ref=f112e638]: A.
                - generic [ref=f112e640]:
                  - paragraph [ref=f112e641]: 1. If the drain hose is twisted or bent, or if the drain hose is installed too high, the water flow may be interrupted and the water may not drain well. In this case, make sure that the drain hose is not more than 6 cm off of the floor and arrange it so that the bottom of the hose falls evenly, without obstruction.
                  - paragraph [ref=f112e642]: 2. Make sure that the drain hose is not blocked with dust or other substances.
                  - paragraph [ref=f112e643]: 3. Check if the drain hose has frozen due to cold weather.
            - listitem [ref=f112e644]:
              - generic [ref=f112e646]:
                - generic [ref=f112e647]: Q.
                - paragraph [ref=f112e650]: "[De] What should I do when I encounter this error?"
              - generic [ref=f112e652]:
                - generic [ref=f112e653]: A.
                - paragraph [ref=f112e656]: If the valve where the source water is supplied or the dispense valve of the faucet is closed, the water pipe sterilization and water outlet sterilization features will not work. Please open the source water valve or the dispense valve.
