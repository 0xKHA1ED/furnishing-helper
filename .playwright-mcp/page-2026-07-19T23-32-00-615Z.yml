        - generic [ref=f112e1260]:
          - generic [ref=f112e1261]:
            - paragraph [ref=f112e1262]: Jet Spray Technology - With this technology, clean water is sprayed directly through a Jet Spray Nozzle that cleans the core and dirty areas of the clothes. It helps to reduce manual labour and aids in the lesser use of water along with removing all the detergent stains effectively. 6 Motion DD - This wash program moves the wash drum in multiple directions with its innovative 6 Motion Direct Drive technology which gives the fabrics a clean wash along with maintaining its soft quality. It helps in obtaining cloth quality retention along with cleaner and untangled laundry .LG ThinQ - This feature from LG makes your laundry load much easier as it enables one to do laundry from any place and any time. It comes with Smart Diagnosis™ helps you to troubleshoot any problem saving your time & money and Download Cycle enables to schedule up to 20 wash programs. Quick Tub Clean - This feature uses hot steam with high spin speed to sterilize every corner of the tub which prevents the development of fungus and toxic substances in the tub area. Smart Diagnosis System - With the help of Smart Diagnosis™ System, LG has helped you in saving your precious time & money by assisting you to automatically detect and troubleshoot a problem with just one phone call. WaveForce Technology - Powerful rapid drum movement and water jets provide a revolutionary washing experience you have to see to believe. TrueBalance Anti-Vibration System - Reduces washer noise and vibration for a top-load wash so quiet, you won’t even know it is on. Capacity - Amongst the largest capacity washing machines in their class, LG’s top-load washers offer an extra-large capacity at 3.7 cubic feet and an ultra large capacity at 4.7 cubic feet, saving you time and energy with every wash.EasyDispense System - The Easy Dispense system from LG allows you to add bleach, detergent and fabric softener all at once for automatic release at the appropriate cycle time. Direct Drive Motor - Features fewer moving parts that operate more efficiently while being securely backed with a 10-year warranty for the ultimate peace of mind.
            - paragraph [ref=f112e1263]
          - button "Load more text" [ref=f112e1264] [cursor=pointer]: More
